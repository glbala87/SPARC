services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  sparc-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SCTOOLS_UPLOAD_DIR=/data/uploads
      - SCTOOLS_OUTPUT_DIR=/data/outputs
      - SPARC_API_TOKENS=dev-token  # CHANGE THIS in production
    volumes:
      - sparc-data:/data
    depends_on:
      - redis

  sparc-worker:
    build: .
    command: celery -A web.backend.workers.pipeline worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SCTOOLS_UPLOAD_DIR=/data/uploads
      - SCTOOLS_OUTPUT_DIR=/data/outputs
    volumes:
      - sparc-data:/data
    depends_on:
      - redis

volumes:
  redis-data:
  sparc-data:
