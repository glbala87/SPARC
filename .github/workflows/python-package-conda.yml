name: SPARC CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust build and test ──────────────────────────────────────────
  rust-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhts-dev libdeflate-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev zlib1g-dev cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install htslib xz

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p sparc-core -p sparc-cli -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --release -p sparc-core -p sparc-cli

      - name: Test
        run: cargo test -p sparc-core -p sparc-cli

  # ── Python build and test ────────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhts-dev libdeflate-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev zlib1g-dev cmake

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and build
        run: |
          pip install maturin
          maturin develop --release
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov numpy scipy pandas anndata scanpy scikit-learn

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check python/ tests/ --select E9,F63,F7,F82
        continue-on-error: true

      - name: Test with pytest
        run: pytest tests/python/ -v --cov=sparc

  # ── Docker build ─────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [rust-test, python-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sparc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release wheels ───────────────────────────────────────────────
  release:
    runs-on: ${{ matrix.os }}
    needs: [rust-test, python-test]
    if: github.event_name == 'release'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhts-dev libdeflate-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev zlib1g-dev cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install htslib xz

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release -o dist/
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
